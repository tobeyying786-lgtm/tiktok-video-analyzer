.sb-table{width:100%;border-collapse:collapse;margin-bottom:20px}.sb-table th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}.sb-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:top}.sb-table tr:hover td{background:rgba(255,255,255,.02)}.sb-table .td-img{width:80px}.sb-table .td-img img{width:72px;height:96px;object-fit:cover;border-radius:6px;cursor:zoom-in}.sb-table .td-img .ph{width:72px;height:96px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text3)}.sb-table .type-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}

<body>
<div class="hdr"><div class="hdr-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div><h1>爆款短视频拆解工具</h1><p id="hdr-sub">AI驱动的视频结构分析</p></div><span class="hdr-right" id="btn-reset" style="display:none" onclick="resetAll()">← 重新分析</span></div>
<div class="main">
<div id="page-upload">
  <div class="upload-zone" id="upzone"><span class="fb" onclick="event.stopPropagation();document.getElementById('fileIn').click()">未选择任何文件</span><div class="up-arrow"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div><div class="up-text">拖拽视频到这里，或点击上传</div><div class="up-hint">支持 MP4, MOV, AVI, WebM 格式，最大 200MB</div><input type="file" id="fileIn" accept="video/*"></div>
  <div class="feat-grid"><div class="feat"><div class="fi">📷</div><div><h3>智能镜头拆解</h3><p>自动识别场景切换，提取关键帧截图</p></div></div><div class="feat"><div class="fi">📊</div><div><h3>数据指标分析</h3><p>产品露出时长、首现时间等关键指标</p></div></div><div class="feat"><div class="fi">📋</div><div><h3>分镜脚本生成</h3><p>生成完整分镜表格，一键导出</p></div></div><div class="feat"><div class="fi">🔄</div><div><h3>跨品类改编</h3><p>智能改编脚本，适配不同产品</p></div></div></div>
  <button class="btn-go" id="btn-go" onclick="startAnalysis()">⚡ 开始拆解分析</button>
  <div class="prog" id="prog"><div class="prog-card"><div class="prog-title"><div class="spin"></div><span id="prog-msg">分析中…</span></div><div class="prog-list" id="prog-list"></div></div></div>
  <div class="err" id="errBox"><span>⚠️</span><span id="errMsg"></span></div>
</div>
<div id="page-result">
  <div class="metrics" id="metrics"></div>
  <div class="tip-bar" id="tip-bar"></div>
  <div class="tabs"><div class="tab active" data-tab="t1" onclick="switchTab('t1',this)">📷 镜头截图</div><div class="tab" data-tab="t2" onclick="switchTab('t2',this)">📋 分镜脚本</div><div class="tab" data-tab="t3" onclick="switchTab('t3',this)">📊 脚本结构分析</div><div class="tab" data-tab="t4" onclick="switchTab('t4',this)">✨ AI 视频生成</div><div class="tab" style="color:var(--text3);cursor:default;opacity:.5">📥 导出报告</div></div>
  <div class="tab-panel active" id="t1"></div>
  <div class="tab-panel" id="t2"></div>
  <div class="tab-panel" id="t3"></div>
  <div class="tab-panel" id="t4"></div>
  <div class="action-bar">
    <button class="btn-sec" id="btn-feishu" onclick="saveToFeishu()">📝 写入飞书多维表格</button>
    <button class="btn-sec" onclick="resetAll()">🔄 拆解下一条</button>
  </div>
</div>
</div>
<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lb-img" src=""></div>
<div class="ftip" id="ftip"><span class="dot"></span>拉片具体怎么逐帧拆解？<span class="x" onclick="event.stopPropagation();document.getElementById('ftip').style.display='none'">✕</span></div>
<script>
let curFile=null,analysisData=null;
const upzone=document.getElementById('upzone'),fileIn=document.getElementById('fileIn');
upzone.addEventListener('click',()=>fileIn.click());
upzone.addEventListener('dragover',e=>{e.preventDefault();upzone.classList.add('drag')});
upzone.addEventListener('dragleave',()=>upzone.classList.remove('drag'));
upzone.addEventListener('drop',e=>{e.preventDefault();upzone.classList.remove('drag');if(e.dataTransfer.files.length&&e.dataTransfer.files[0].type.startsWith('video/')){curFile=e.dataTransfer.files[0];showSel()}});
fileIn.addEventListener('change',()=>{if(fileIn.files.length){curFile=fileIn.files[0];showSel()}});
function showSel(){upzone.innerHTML='<div style="text-align:center"><div style="font-size:40px;margin-bottom:10px">✅</div><div style="font-size:16px;font-weight:600;color:var(--accent2)">'+esc(curFile.name)+'</div><div style="font-size:13px;color:var(--text3)">'+(curFile.size/1048576).toFixed(1)+' MB</div></div><input type="file" id="fileIn" accept="video/*" style="display:none">';document.getElementById('fileIn').addEventListener('change',()=>{if(document.getElementById('fileIn').files.length){curFile=document.getElementById('fileIn').files[0];showSel()}})}
async function startAnalysis(){if(!curFile)return showErr('请先上传视频文件');hideErr();document.getElementById('btn-go').disabled=true;showProg();const fd=new FormData();fd.append('video',curFile);try{const resp=await fetch('/api/analyze',{method:'POST',body:fd});if(!resp.ok&&!resp.headers.get('content-type')?.includes('event-stream')){const e=await resp.json().catch(()=>({}));throw new Error(e.error||'HTTP '+resp.status)}const reader=resp.body.getReader(),dec=new TextDecoder();let buf='',final=null;while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const parts=buf.split('\n\n');buf=parts.pop();for(const p of parts)for(const l of p.split('\n'))if(l.startsWith('data: ')){try{const m=JSON.parse(l.slice(6));onSSE(m);if(m.data)final=m.data}catch(e){}}}if(buf.trim())for(const l of buf.split('\n'))if(l.startsWith('data: ')){try{const m=JSON.parse(l.slice(6));onSSE(m);if(m.data)final=m.data}catch(e){}}if(!final)throw new Error('未收到分析结果');analysisData=final;renderResult(final)}catch(e){showErr('拆解失败: '+e.message)}finally{document.getElementById('btn-go').disabled=false;setTimeout(hideProg,300)}}
function onSSE(m){const list=document.getElementById('prog-list'),msg=document.getElementById('prog-msg');if(m.step===-1){showErr(m.message);return}msg.textContent=m.message||'';let el=document.getElementById('ps-'+m.step);if(!el){el=document.createElement('div');el.id='ps-'+m.step;el.className='ps on';el.innerHTML='<span class="si">⏳</span>'+esc(m.message);list.appendChild(el)}list.querySelectorAll('.ps').forEach(p=>{const id=parseFloat(p.id.replace('ps-',''));if(id<m.step){p.className='ps done';p.querySelector('.si').textContent='✓'}});if(m.data){el.className='ps done';el.querySelector('.si').textContent='✓'}}
function renderResult(data){const a=data.analysis||data,ov=a.video_overview||{},ss=a.script_structure||{},em=a.extracted_materials||{},shots=a.shots||[];document.getElementById('page-upload').style.display='none';document.getElementById('page-result').style.display='block';document.getElementById('btn-reset').style.display='';document.getElementById('hdr-sub').textContent='分析报告 - '+(curFile?curFile.name:'');
document.getElementById('metrics').innerHTML='<div class="mc"><div class="mv c-orange">'+(ov.product_first_appear_seconds||'--')+'秒</div><div class="ml">产品首次出现</div><div class="ms">黄金3秒内出现最佳</div></div><div class="mc"><div class="mv c-green">'+(ov.product_exposure_seconds||'--')+'秒</div><div class="ml">产品露出时长</div><div class="ms">建议占比30%以上</div></div><div class="mc"><div class="mv c-accent">'+(ov.product_exposure_ratio||'--')+'%</div><div class="ml">产品露出占比</div><div class="ms">高转化视频40%+</div></div><div class="mc"><div class="mv c-blue">'+(ov.total_duration_seconds||'--')+'秒</div><div class="ml">视频总时长</div><div class="ms">短视频15-60秒最佳</div></div><div class="mc"><div class="mv c-pink">'+(ov.total_shots||shots.length)+'个</div><div class="ml">镜头数量</div><div class="ms">平均2-3秒/镜头</div></div>';
const fa=ov.product_first_appear_seconds;document.getElementById('tip-bar').innerHTML=fa?'💡 优化建议：产品首现时间为'+fa+'秒，'+(fa>5?'建议在5秒内展示产品':'表现良好！'):'';
renderTab1(shots);renderTab2(shots);renderTab3(a,ss,shots)}
function renderTab1(shots){const tc={};shots.forEach(s=>{const t=s.shot_type||'其他';tc[t]=(tc[t]||0)+1});let bar='',cards='';shots.forEach((s,i)=>{const cls=shotCls(s.shot_type);bar+='<div class="sb-seg bg-'+cls+'">'+esc(s.shot_type||'')+' '+s.time_start+'-'+s.time_end+'s</div>';const url=s.frame_url||'';const isFirst=s.product_visible&&!shots.slice(0,i).some(x=>x.product_visible);cards+='<div class="sc" onclick="'+(url?"openLB('"+esc(url)+"')":'')+'">'+'<div class="sc-img'+(isFirst?' fp-border':'')+'">'+(url?'<img src="'+esc(url)+'" alt="">':'<div class="ph">🎬</div>')+'<span class="sn">#'+(s.shot_number||i+1)+'</span><span class="st">'+(s.time_start??'')+'s</span>'+(isFirst?'<span class="fpb">⭐ 产品首现</span>':'')+'</div><div class="sc-tag"><span class="bg-'+cls+'">'+esc(s.shot_type||'镜头')+'</span></div></div>'});let stats='';Object.entries(tc).sort((a,b)=>b[1]-a[1]).forEach(([t,n])=>{stats+='<div class="ss-item"><div class="ssn">'+n+'</div><div class="ssl"><span class="bg-'+shotCls(t)+'">'+esc(t)+'</span></div></div>'});
document.getElementById('t1').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:15px;font-weight:700">🎬 全部镜头（'+shots.length+'个分镜）</div><div style="font-size:12px;color:var(--text3)">点击镜头可放大查看 ⭐ 产品首现</div></div><div class="shot-bar">'+bar+'</div><div class="shot-scroll">'+cards+'</div><div class="shot-stats">'+stats+'</div>'}
function renderTab2(shots){let rows='';shots.forEach((s,i)=>{const url=s.frame_url||'';const cls=shotCls(s.shot_type);rows+='<tr><td style="font-weight:600">#'+(s.shot_number||i+1)+'</td><td style="font-family:JetBrains Mono,monospace;font-size:12px;white-space:nowrap">'+s.time_start+'-'+s.time_end+'s</td><td><span class="type-tag bg-'+cls+'">'+esc(s.shot_type||'')+'</span></td><td style="max-width:300px;line-height:1.6">'+esc(s.scene_description||'')+'</td><td class="td-img">'+(url?'<img src="'+esc(url)+'" onclick="openLB(\''+esc(url)+'\')">':'<div class="ph">🎬</div>')+'</td><td style="max-width:260px;font-size:12px;line-height:1.6">'+(s.voiceover?'<strong>口播：</strong>'+esc(s.voiceover)+'<br>':'')+(s.text_overlay?'<strong>字幕：</strong>'+esc(s.text_overlay):'')+'</td><td style="text-align:center">'+(s.product_visible?'<span class="c-red" style="font-size:18px">✕</span>':'')+'</td></tr>'});
document.getElementById('t2').innerHTML='<div class="sb-top"><h3>分镜脚本表格</h3><button class="btn-copy" onclick="copyTable()">📋 复制表格</button></div><div style="overflow-x:auto"><table class="sb-table" id="sb-table"><thead><tr><th>镜头</th><th>时间</th><th>类型</th><th>画面描述</th><th>镜头截图</th><th>文案/口播</th><th>产品</th></tr></thead><tbody>'+rows+'</tbody></table></div>'}
function renderTab3(a,ss,shots){const bd=ss.structure_breakdown||[];let blocks='';bd.forEach(b=>{const cls=elemCls(b.element);const sn=b.shots_included||[];const sd=sn.map(n=>{const s=shots.find(x=>x.shot_number===n);return s?s.scene_description:''}).filter(Boolean);blocks+='<div class="str-block"><span class="sb-tag bg-'+cls+'">'+esc(b.element)+'</span><span class="sb-time">'+esc(b.time_range||'')+'</span><span class="sb-count">x'+sn.length+'</span><div class="sb-desc" style="margin-top:10px">'+sd.map(d=>esc(d)).join('；')+'</div><div class="sb-note">+'+esc(b.description||'')+'</div></div>'});
document.getElementById('t3').innerHTML='<div class="str-layout"><div class="str-left"><div style="font-size:16px;font-weight:700;margin-bottom:6px">📊 脚本结构分析</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:13px;color:var(--text3)">分析和拆解文案脚本结构</span><span style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 12px;font-size:12px;color:var(--text3);font-family:JetBrains Mono,monospace">'+(curFile?curFile.name.replace(/\.[^.]+$/,''):'')+'</span></div>'+blocks+'</div><div class="str-right" style="position:sticky;top:80px;align-self:start"><div class="rw-panel"><h3>✏️ 将文案脚本进行跨类目复刻</h3><div class="rw-field"><label>新品类</label><input id="rw-cat" placeholder="宠物用品"></div><div class="rw-field"><label>产品名称</label><input id="rw-name" placeholder="猫咪自动饮水机"></div><div class="rw-field"><label>核心卖点（可选）</label><input id="rw-sell" placeholder="静音水泵、四重过滤、2L大容量"></div><button class="btn-rw" id="btn-rw" onclick="doRewrite()">开始跨品类改编</button><div class="rw-result" id="rw-result"></div></div></div></div>'}
async function doRewrite(){const cat=document.getElementById('rw-cat').value.trim();const name=document.getElementById('rw-name').value.trim();const sell=document.getElementById('rw-sell').value.trim();if(!cat||!name)return showErr('请填写新品类和产品名称');hideErr();const btn=document.getElementById('btn-rw');btn.disabled=true;btn.textContent='改编中…';const re=document.getElementById('rw-result');re.innerHTML='<div style="color:var(--text3);padding:20px;text-align:center"><div class="spin" style="margin:0 auto 10px"></div>Claude 正在改编脚本…</div>';try{const resp=await fetch('/api/rewrite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analysis:analysisData?.analysis||analysisData,newCategory:cat,productName:name,coreSellingPoints:sell})});const data=await resp.json();if(!resp.ok)throw new Error(data.error||'改写失败');renderRewrite(data.rewrite)}catch(e){re.innerHTML='<div style="color:var(--red);padding:12px">❌ '+esc(e.message)+'</div>'}finally{btn.disabled=false;btn.textContent='开始跨品类改编'}}
function renderRewrite(rw){const items=rw.rewritten_structure||[];const re=document.getElementById('rw-result');if(rw.raw_response){re.innerHTML='<div style="background:var(--bg3);border-radius:var(--r);padding:16px;margin-top:16px;font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.8">'+esc(rw.raw_response)+'</div>';return}let h=items.map(it=>{const cls=elemCls(it.element);return'<div class="rw-item"><button class="btn-cp" onclick="navigator.clipboard.writeText(this.parentElement.innerText)">复制</button><span class="rw-tag bg-'+cls+'">'+esc(it.element)+'</span><div class="rw-en">'+esc(it.scene_description_en||it.voiceover_en||'')+'</div><div class="rw-cn">'+esc(it.scene_description_cn||it.voiceover_cn||'')+'</div>'+(it.shooting_notes?'<div class="rw-note">推荐镜头：'+esc(it.shooting_notes)+'</div>':'')+'</div>'}).join('');if(rw.hook_suggestion)h+='<div class="rw-item"><span class="rw-tag bg-blue">Hook</span><div class="rw-en">'+esc(rw.hook_suggestion)+'</div></div>';if(rw.cta_suggestion)h+='<div class="rw-item"><span class="rw-tag bg-red">CTA</span><div class="rw-en">'+esc(rw.cta_suggestion)+'</div></div>';re.innerHTML=h}
async function saveToFeishu(){if(!analysisData)return showErr('请先完成视频拆解');const btn=document.getElementById('btn-feishu');btn.disabled=true;btn.textContent='📝 写入中…';hideErr();const videoCode=prompt('请输入视频编码（可留空）：','')||'';try{const resp=await fetch('/api/save-to-feishu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analysis:analysisData?.analysis||analysisData,videoCode:videoCode,videoUrl:analysisData?.videoUrl||'',filename:curFile?curFile.name:''})});const data=await resp.json();if(!resp.ok)throw new Error(data.error||'写入失败');const saved=data.results?.saved?.length||0;const errors=data.results?.errors?.length||0;btn.textContent='✅ 已写入 '+saved+' 条';if(errors>0)showErr('部分写入失败：'+data.results.errors.map(e=>e.table+': '+e.error).join('; '));setTimeout(()=>{btn.textContent='📝 写入飞书多维表格';btn.disabled=false},3000)}catch(e){showErr('飞书写入失败: '+e.message);btn.textContent='📝 写入飞书多维表格';btn.disabled=false}}
function switchTab(id,el){if(el.style.opacity==='0.5')return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById(id).classList.add('active')}
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML}
function shotCls(t){const r=(t||'').toLowerCase();if(r.includes('痛点')||r.includes('情绪'))return'orange';if(r.includes('产品')||r.includes('展示'))return'green';if(r.includes('场景')||r.includes('使用'))return'blue';if(r.includes('特写')||r.includes('细节'))return'purple';if(r.includes('对比')||r.includes('效果'))return'amber';if(r.includes('行动')||r.includes('引导'))return'red';if(r.includes('开箱'))return'pink';if(r.includes('证明'))return'amber';return'slate'}
function elemCls(e){const r=(e||'').toLowerCase();if(r.includes('停'))return'blue';if(r.includes('病'))return'orange';if(r.includes('药'))return'green';if(r.includes('信'))return'amber';if(r.includes('买'))return'red';return'slate'}
function showProg(){document.getElementById('prog').classList.add('on');document.getElementById('prog-list').innerHTML='';document.getElementById('prog-msg').textContent='分析中…'}
function hideProg(){document.getElementById('prog').classList.remove('on')}
function showErr(m){document.getElementById('errMsg').textContent=m;document.getElementById('errBox').classList.add('on')}
function hideErr(){document.getElementById('errBox').classList.remove('on')}
function openLB(src){document.getElementById('lb-img').src=src;document.getElementById('lb').classList.add('on')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lb').classList.remove('on')});
function copyTable(){const t=document.getElementById('sb-table');if(!t)return;const r=document.createRange();r.selectNode(t);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');window.getSelection().removeAllRanges();const b=document.querySelector('.btn-copy');b.textContent='✓ 已复制';setTimeout(()=>b.textContent='📋 复制表格',2000)}
function resetAll(){curFile=null;analysisData=null;document.getElementById('page-upload').style.display='';document.getElementById('page-result').style.display='none';document.getElementById('btn-reset').style.display='none';document.getElementById('hdr-sub').textContent='AI驱动的视频结构分析';hideErr();hideProg();const uz=document.getElementById('upzone');uz.innerHTML='<span class="fb" onclick="event.stopPropagation();document.getElementById(\'fileIn\').click()">未选择任何文件</span><div class="up-arrow"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7" stroke="var(--text3)" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="up-text">拖拽视频到这里，或点击上传</div><div class="up-hint">支持 MP4, MOV, AVI, WebM 格式，最大 200MB</div><input type="file" id="fileIn" accept="video/*" style="display:none">';document.getElementById('fileIn').addEventListener('change',()=>{if(document.getElementById('fileIn').files.length){curFile=document.getElementById('fileIn').files[0];showSel()}})}

// ============== Tab 4: AI 视频生成 ==============
let t4RewriteData = null;
let t4Platforms = null;
let t4BgmData = null;
let t4GenTaskKey = null;
let t4PollTimer = null;
let t4Initialized = false;

function renderTab4() {
  const panel = document.getElementById('t4');
  const rw = getRewriteData();
  if (!rw || !rw.rewritten_structure || rw.rewritten_structure.length === 0) {
    panel.innerHTML = '<div class="t4-no-data"><div class="nd-icon">✨</div><div class="nd-text">请先在「脚本结构分析」Tab 完成跨品类改编</div><div class="nd-hint">改编完成后回到此页，即可编辑脚本并生成视频</div></div>';
    return;
  }
  // Only clone from source on first load; preserve edits after
  if (!t4Initialized || !t4RewriteData) {
    t4RewriteData = JSON.parse(JSON.stringify(rw));
    t4Initialized = true;
  }
  t4RenderEditor();
}

function t4RenderEditor() {
  const panel = document.getElementById('t4');
  const shots = t4RewriteData.rewritten_structure;

  let shotsHtml = shots.map((item, i) => {
    const cls = elemCls(item.element);
    return '<div class="t4-shot" id="t4-shot-' + i + '">' +
      '<div class="shot-hdr">' +
        '<span class="shot-idx">#' + (i+1) + '</span>' +
        '<span class="shot-elem bg-' + cls + '">' + esc(item.element) + '</span>' +
        '<span style="font-size:11px;color:var(--text3)">' + esc(item.shot_type||'') + '</span>' +
      '</div>' +
      '<div class="shot-field">' +
        '<label>🎬 画面描述</label>' +
        '<textarea rows="2" data-idx="' + i + '" data-field="scene_description_cn" oninput="t4UpdateShot(this)">' + esc(item.scene_description_cn||'') + '</textarea>' +
      '</div>' +
      '<div class="shot-field">' +
        '<label>🎤 口播文案</label>' +
        '<textarea rows="2" data-idx="' + i + '" data-field="voiceover_cn" oninput="t4UpdateShot(this)">' + esc(item.voiceover_cn||'') + '</textarea>' +
      '</div>' +
      '<div class="shot-field">' +
        '<label>📝 字幕文字</label>' +
        '<input type="text" data-idx="' + i + '" data-field="text_overlay" oninput="t4UpdateShot(this)" value="' + esc(item.text_overlay||'') + '">' +
      '</div>' +
      '<div class="shot-field">' +
        '<label>📸 拍摄建议</label>' +
        '<textarea rows="1" data-idx="' + i + '" data-field="shooting_notes" oninput="t4UpdateShot(this)">' + esc(item.shooting_notes||'') + '</textarea>' +
      '</div>' +
      '<div style="border-top:1px dashed var(--border);margin-top:10px;padding-top:10px">' +
        '<details style="font-size:12px;color:var(--text3)">' +
          '<summary style="cursor:pointer">EN 原文（供视频生成 API 使用，可修改）</summary>' +
          '<div class="shot-field" style="margin-top:8px">' +
            '<label>Scene (EN)</label>' +
            '<textarea rows="2" data-idx="' + i + '" data-field="scene_description_en" oninput="t4UpdateShot(this)">' + esc(item.scene_description_en||'') + '</textarea>' +
          '</div>' +
          '<div class="shot-field">' +
            '<label>Voiceover (EN)</label>' +
            '<textarea rows="2" data-idx="' + i + '" data-field="voiceover_en" oninput="t4UpdateShot(this)">' + esc(item.voiceover_en||'') + '</textarea>' +
          '</div>' +
        '</details>' +
      '</div>' +
      '<div class="shot-actions" style="margin-top:8px">' +
        '<button class="btn-sm" onclick="t4RemoveShot(' + i + ')">删除</button>' +
        (i > 0 ? '<button class="btn-sm" onclick="t4MoveShot(' + i + ',-1)">↑</button>' : '') +
        (i < shots.length-1 ? '<button class="btn-sm" onclick="t4MoveShot(' + i + ',1)">↓</button>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  let extraHtml = '';
  if (t4RewriteData.hook_suggestion) {
    extraHtml += '<div class="t4-shot" style="border-color:var(--blue)">' +
      '<div class="shot-hdr"><span class="shot-elem bg-blue">Hook</span><span style="font-size:11px;color:var(--text3)">开头钩子</span></div>' +
      '<div class="shot-field"><label>🪝 钩子话术</label>' +
      '<textarea rows="2" id="t4-hook" oninput="t4RewriteData.hook_suggestion=this.value">' + esc(t4RewriteData.hook_suggestion) + '</textarea></div>' +
    '</div>';
  }
  if (t4RewriteData.cta_suggestion) {
    extraHtml += '<div class="t4-shot" style="border-color:var(--red)">' +
      '<div class="shot-hdr"><span class="shot-elem bg-red">CTA</span><span style="font-size:11px;color:var(--text3)">结尾促单</span></div>' +
      '<div class="shot-field"><label>🛒 促单话术</label>' +
      '<textarea rows="2" id="t4-cta" oninput="t4RewriteData.cta_suggestion=this.value">' + esc(t4RewriteData.cta_suggestion) + '</textarea></div>' +
    '</div>';
  }

  var shotCount = shots.length;
  var singleCost = 60;

  panel.innerHTML = '<div class="t4-layout">' +
    '<div class="t4-editor">' +
      '<div class="t4-title">✏️ 仿写脚本编辑器 <span style="font-size:12px;color:var(--text3);font-weight:400">每个镜头均可编辑 · 展开可修改 EN 原文</span></div>' +
      extraHtml +
      '<div id="t4-shots">' + shotsHtml + '</div>' +
      '<button class="btn-sm" style="margin-top:12px;padding:8px 16px" onclick="t4AddShot()">+ 添加镜头</button>' +
      '<div style="margin-top:16px">' +
        '<button class="btn-sm" style="padding:8px 16px" onclick="t4TogglePrompt()">👁 预览发送给 AI 的 Prompt</button>' +
        '<div class="t4-prompt-preview" id="t4-prompt-preview"></div>' +
      '</div>' +
    '</div>' +
    '<div class="t4-sidebar">' +
      '<div class="t4-panel">' +
        '<h3>🎬 视频生成设置</h3>' +
        '<div style="margin-bottom:14px">' +
          '<div class="t4-opt"><span class="opt-label">生成模式</span></div>' +
          '<select class="t4-select" id="t4-gen-mode" onchange="t4UpdateCost()">' +
            '<option value="single">整条生成（一个 prompt → 一条 8s 视频）</option>' +
            '<option value="pershot">逐镜头生成 + 拼接（每镜头独立生成）</option>' +
          '</select>' +
        '</div>' +
        '<div style="margin-bottom:14px">' +
          '<div class="t4-opt"><span class="opt-label">生成平台</span></div>' +
          '<select class="t4-select" id="t4-platform" onchange="t4PlatformChange()"><option value="">加载中...</option></select>' +
        '</div>' +
        '<div style="margin-bottom:14px">' +
          '<div class="t4-opt"><span class="opt-label">模型选择</span></div>' +
          '<select class="t4-select" id="t4-model" onchange="t4UpdateCost()"><option value="">先选平台</option></select>' +
        '</div>' +
        '<div style="margin-bottom:14px">' +
          '<div class="t4-opt"><span class="opt-label">画面比例</span></div>' +
          '<div class="t4-radio">' +
            '<label><input type="radio" name="t4ar" value="9:16" checked> 9:16 竖屏</label>' +
            '<label><input type="radio" name="t4ar" value="16:9"> 16:9 横屏</label>' +
            '<label><input type="radio" name="t4ar" value="1:1"> 1:1</label>' +
          '</div>' +
        '</div>' +
        '<div style="margin-bottom:14px">' +
          '<label class="t4-check"><input type="checkbox" id="t4-subtitle" checked> 在 prompt 中包含字幕提示</label>' +
        '</div>' +
        '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px">' +
          '<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">📊 预估</div>' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--text3)">镜头数</span><span style="color:var(--text);font-weight:600" id="t4-cost-shots">' + shotCount + ' 个</span></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--text3)">生成次数</span><span style="color:var(--text);font-weight:600" id="t4-cost-count">1 次</span></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--text3)">预估费用</span><span style="color:var(--orange);font-weight:600" id="t4-cost-credits">~' + singleCost + ' credits</span></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text3)">预估耗时</span><span style="color:var(--text);font-weight:600" id="t4-cost-time">1-3 分钟</span></div>' +
        '</div>' +
        '<button class="btn-gen" id="btn-gen" onclick="t4Generate()" disabled>⚡ 生成视频</button>' +
        '<div class="gen-progress" id="gen-progress">' +
          '<div class="gp-bar"><div class="gp-fill" id="gp-fill"></div></div>' +
          '<div class="gp-text" id="gp-text">准备中...</div>' +
        '</div>' +
        '<div class="gen-result" id="gen-result">' +
          '<video id="gen-video" controls></video>' +
          '<div class="gr-actions">' +
            '<a id="gen-download" class="btn-sm" style="padding:8px 16px;text-decoration:none" download>⬇ 下载视频</a>' +
            '<button class="btn-sm" style="padding:8px 16px" onclick="t4Generate()">🔄 重新生成</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="t4-panel">' +
        '<h3>🎵 BGM 推荐</h3>' +
        '<div class="bgm-list" id="t4-bgm-list"><div style="text-align:center;padding:20px;color:var(--text3);font-size:13px"><div class="spin" style="margin:0 auto 8px"></div>加载 BGM 库...</div></div>' +
      '</div>' +
    '</div>' +
  '</div>';

  t4LoadPlatforms();
  t4LoadBgm();
}

function getRewriteData() {
  if (window._lastRewrite) return window._lastRewrite;
  return null;
}

// Patch renderRewrite to store data for Tab 4
var _origRenderRewrite = renderRewrite;
renderRewrite = function(rw) {
  window._lastRewrite = rw;
  t4RewriteData = null;
  t4Initialized = false;
  _origRenderRewrite(rw);
};

function t4UpdateShot(el) {
  var idx = parseInt(el.dataset.idx);
  var field = el.dataset.field;
  if (t4RewriteData && t4RewriteData.rewritten_structure[idx]) {
    t4RewriteData.rewritten_structure[idx][field] = el.value;
  }
}

function t4RemoveShot(idx) {
  if (!t4RewriteData) return;
  t4RewriteData.rewritten_structure.splice(idx, 1);
  t4RenderEditor();
}

function t4MoveShot(idx, dir) {
  if (!t4RewriteData) return;
  var arr = t4RewriteData.rewritten_structure;
  var ni = idx + dir;
  if (ni < 0 || ni >= arr.length) return;
  var tmp = arr[idx]; arr[idx] = arr[ni]; arr[ni] = tmp;
  t4RenderEditor();
}

function t4AddShot() {
  if (!t4RewriteData) return;
  t4RewriteData.rewritten_structure.push({
    element: '药', shot_type: '产品展示',
    scene_description_cn: '', scene_description_en: '',
    voiceover_cn: '', voiceover_en: '',
    text_overlay: '', shooting_notes: ''
  });
  t4RenderEditor();
}

function t4UpdateCost() {
  var mode = document.getElementById('t4-gen-mode');
  mode = mode ? mode.value : 'single';
  var model = document.getElementById('t4-model');
  model = model ? model.value : '';
  var shotCount = t4RewriteData ? t4RewriteData.rewritten_structure.length : 0;
  var isQuality = model.indexOf('fast') === -1 && model.indexOf('veo3') !== -1;
  var baseCost = isQuality ? 400 : 60;
  var count = mode === 'pershot' ? shotCount : 1;
  var cost = baseCost * count;
  var timeMin = mode === 'pershot' ? shotCount : 1;
  var timeMax = timeMin * 3;
  var el = function(id) { return document.getElementById(id); };
  if (el('t4-cost-shots')) el('t4-cost-shots').textContent = shotCount + ' 个';
  if (el('t4-cost-count')) el('t4-cost-count').textContent = count + ' 次';
  if (el('t4-cost-credits')) el('t4-cost-credits').textContent = '~' + cost + ' credits';
  if (el('t4-cost-time')) el('t4-cost-time').textContent = timeMin + '-' + timeMax + ' 分钟';
}

function t4TogglePrompt() {
  var el = document.getElementById('t4-prompt-preview');
  if (el.classList.contains('on')) { el.classList.remove('on'); return; }
  el.textContent = t4BuildPrompt();
  el.classList.add('on');
}

function t4BuildPrompt() {
  if (!t4RewriteData) return '';
  var shots = t4RewriteData.rewritten_structure || [];
  var subtitle = document.getElementById('t4-subtitle');
  subtitle = subtitle ? subtitle.checked : false;
  var arEl = document.querySelector('input[name="t4ar"]:checked');
  var ar = arEl ? arEl.value : '9:16';
  var orient = ar === '9:16' ? 'vertical portrait 9:16' : ar === '16:9' ? 'landscape 16:9' : 'square 1:1';
  var prompt = 'TikTok e-commerce product video. ' + orient + ' format. Fast-paced, engaging, bright visuals.\n\n';
  if (t4RewriteData.hook_suggestion) {
    prompt += '[HOOK - First 3 seconds]: ' + t4RewriteData.hook_suggestion + '\n\n';
  }
  for (var i = 0; i < shots.length; i++) {
    var s = shots[i];
    var desc = s.scene_description_en || s.scene_description_cn || '';
    var vo = s.voiceover_en || s.voiceover_cn || '';
    prompt += '[Shot ' + (i+1) + ' - ' + (s.element||'Scene') + ']: ' + desc;
    if (vo) prompt += ' Voiceover: "' + vo + '"';
    if (s.shooting_notes) prompt += ' Camera: ' + s.shooting_notes;
    if (subtitle && s.text_overlay) prompt += ' Text overlay: "' + s.text_overlay + '"';
    prompt += '\n\n';
  }
  if (t4RewriteData.cta_suggestion) {
    prompt += '[CTA - Closing]: ' + t4RewriteData.cta_suggestion + '\n';
  }
  return prompt.trim();
}

function t4BuildShotPrompt(shot) {
  var desc = shot.scene_description_en || shot.scene_description_cn || '';
  var vo = shot.voiceover_en || shot.voiceover_cn || '';
  var p = 'TikTok product video shot. ' + desc;
  if (vo) p += ' Voiceover: "' + vo + '"';
  if (shot.shooting_notes) p += ' Camera: ' + shot.shooting_notes;
  if (shot.text_overlay) p += ' Text: "' + shot.text_overlay + '"';
  return p;
}

function t4LoadPlatforms() {
  fetch('/api/videogen/platforms').then(function(r){return r.json()}).then(function(d){
    t4Platforms = d.platforms;
    var sel = document.getElementById('t4-platform');
    if (!sel) return;
    var html = '<option value="">— 选择生成平台 —</option>';
    for (var i = 0; i < d.platforms.length; i++) {
      var p = d.platforms[i];
      html += '<option value="' + p.id + '"' + (!p.available ? ' disabled' : '') + '>' + p.name + (!p.available ? ' (未配置 API Key)' : '') + '</option>';
    }
    sel.innerHTML = html;
    var first = d.platforms.find(function(p){return p.available});
    if (first) { sel.value = first.id; t4PlatformChange(); }
  }).catch(function(e){ console.error('平台加载失败:', e); });
}

function t4PlatformChange() {
  var pid = document.getElementById('t4-platform');
  pid = pid ? pid.value : '';
  var msel = document.getElementById('t4-model');
  var btn = document.getElementById('btn-gen');
  if (!pid || !t4Platforms) { msel.innerHTML = '<option value="">先选平台</option>'; btn.disabled = true; return; }
  var p = t4Platforms.find(function(x){return x.id===pid});
  if (!p || !p.available) { msel.innerHTML = '<option value="">平台不可用</option>'; btn.disabled = true; return; }
  var html = '';
  for (var i = 0; i < p.models.length; i++) {
    var m = p.models[i];
    html += '<option value="' + m.id + '">' + m.name + ' — ' + m.price + ' · ' + m.speed + '</option>';
  }
  msel.innerHTML = html;
  btn.disabled = false;
  t4UpdateCost();
}

function t4LoadBgm() {
  fetch('/api/feishu/bgm').then(function(r){return r.json()}).then(function(d){
    if (!d.success) throw new Error(d.error);
    t4BgmData = d.bgm;
    var list = document.getElementById('t4-bgm-list');
    if (!list) return;
    if (d.bgm.length === 0) { list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">BGM 库暂无数据</div>'; return; }
    var html = '';
    for (var i = 0; i < d.bgm.length; i++) {
      var b = d.bgm[i];
      var moodCls = (b.mood||'').indexOf('紧张')!==-1?'mood-tight':(b.mood||'').indexOf('爽')!==-1?'mood-cool':(b.mood||'').indexOf('治愈')!==-1||(b.mood||'').indexOf('轻松')!==-1?'mood-chill':'mood-trend';
      html += '<div class="bgm-item" onclick="t4SelectBgm(this,' + i + ')">' +
        '<div class="bgm-name">' + esc(b.name) + '</div>' +
        '<span class="bgm-mood ' + moodCls + '">' + esc(b.mood) + '</span>' +
        (b.description ? '<div class="bgm-desc">' + esc(b.description) + '</div>' : '') +
      '</div>';
    }
    list.innerHTML = html;
  }).catch(function(e){
    console.error('BGM加载失败:', e);
    var list = document.getElementById('t4-bgm-list');
    if (list) list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">BGM 加载失败</div>';
  });
}

function t4SelectBgm(el) {
  var items = document.querySelectorAll('.bgm-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('selected');
  el.classList.add('selected');
}

function t4Generate() {
  var btn = document.getElementById('btn-gen');
  var prog = document.getElementById('gen-progress');
  var result = document.getElementById('gen-result');
  var fill = document.getElementById('gp-fill');
  var text = document.getElementById('gp-text');
  var platformEl = document.getElementById('t4-platform');
  var platform = platformEl ? platformEl.value : '';
  var modelEl = document.getElementById('t4-model');
  var model = modelEl ? modelEl.value : '';
  var arEl = document.querySelector('input[name="t4ar"]:checked');
  var ar = arEl ? arEl.value : '9:16';
  var genModeEl = document.getElementById('t4-gen-mode');
  var genMode = genModeEl ? genModeEl.value : 'single';

  if (!platform || !model) { alert('请选择生成平台和模型'); return; }
  if (!t4RewriteData) { alert('请先完成脚本编辑'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ 提交中…';
  prog.classList.add('on');
  result.classList.remove('on');
  fill.style.width = '5%';
  text.textContent = '正在提交生成任务…';

  if (genMode === 'pershot') {
    t4GeneratePerShot(platform, model, ar);
  } else {
    t4GenerateSingle(platform, model, ar);
  }
}

function t4GenerateSingle(platform, model, ar) {
  var prompt = t4BuildPrompt();
  if (!prompt.trim()) { alert('脚本内容为空'); t4ResetGenUI(); return; }
  fetch('/api/videogen/generate', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({prompt:prompt, platform:platform, model:model, aspectRatio:ar})
  }).then(function(r){return r.json()}).then(function(d){
    if (!d.success) throw new Error(d.error||'提交失败');
    t4GenTaskKey = d.taskKey;
    document.getElementById('gp-fill').style.width = '15%';
    document.getElementById('gp-text').textContent = '任务已提交，等待生成… (通常 1-3 分钟)';
    document.getElementById('btn-gen').textContent = '⏳ 生成中…';
    t4StartPolling();
  }).catch(function(e){
    alert('生成失败: ' + e.message);
    t4ResetGenUI();
  });
}

function t4GeneratePerShot(platform, model, ar) {
  var shots = t4RewriteData.rewritten_structure;
  var text = document.getElementById('gp-text');
  var fill = document.getElementById('gp-fill');
  text.textContent = '逐镜头模式：共 ' + shots.length + ' 个镜头';
  var taskKeys = [];
  var idx = 0;
  function submitNext() {
    if (idx >= shots.length) {
      t4GenTaskKey = taskKeys;
      fill.style.width = '20%';
      text.textContent = '全部提交完成，等待 ' + shots.length + ' 个镜头生成…';
      document.getElementById('btn-gen').textContent = '⏳ 生成中…';
      t4StartPollingMulti(taskKeys);
      return;
    }
    fill.style.width = (5 + (idx/shots.length)*15) + '%';
    text.textContent = '提交镜头 ' + (idx+1) + '/' + shots.length + '…';
    var shotPrompt = t4BuildShotPrompt(shots[idx]);
    fetch('/api/videogen/generate', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt:shotPrompt, platform:platform, model:model, aspectRatio:ar})
    }).then(function(r){return r.json()}).then(function(d){
      if (!d.success) throw new Error('镜头' + (idx+1) + '失败');
      taskKeys.push(d.taskKey);
      idx++;
      submitNext();
    }).catch(function(e){
      alert('生成失败: ' + e.message);
      t4ResetGenUI();
    });
  }
  submitNext();
}

function t4ResetGenUI() {
  document.getElementById('btn-gen').disabled = false;
  document.getElementById('btn-gen').textContent = '⚡ 生成视频';
  document.getElementById('gen-progress').classList.remove('on');
}

function t4StartPolling() {
  if (t4PollTimer) clearInterval(t4PollTimer);
  var attempts = 0;
  t4PollTimer = setInterval(function(){
    attempts++;
    if (attempts > 120) { clearInterval(t4PollTimer); t4PollTimer=null; document.getElementById('gp-text').textContent='⏰ 超时'; t4ResetGenUI(); return; }
    document.getElementById('gp-fill').style.width = Math.min(15+attempts*0.67,95)+'%';
    document.getElementById('gp-text').textContent = '生成中… 已等待 '+(attempts*5)+'s';
    fetch('/api/videogen/status/'+t4GenTaskKey).then(function(r){return r.json()}).then(function(d){
      if (d.status==='completed' && d.videoUrl) {
        clearInterval(t4PollTimer); t4PollTimer=null;
        document.getElementById('gp-fill').style.width='100%';
        document.getElementById('gp-text').textContent='✅ 生成完成！';
        document.getElementById('gen-video').src=d.videoUrl;
        document.getElementById('gen-download').href=d.videoUrl;
        document.getElementById('gen-result').classList.add('on');
        t4ResetGenUI();
        setTimeout(function(){document.getElementById('gen-progress').classList.remove('on')},2000);
      } else if (d.status==='failed') {
        clearInterval(t4PollTimer); t4PollTimer=null;
        document.getElementById('gp-text').textContent='❌ 生成失败，请重试';
        t4ResetGenUI();
      }
    }).catch(function(e){console.error('轮询失败:',e)});
  }, 5000);
}

function t4StartPollingMulti(taskKeys) {
  if (t4PollTimer) clearInterval(t4PollTimer);
  var attempts = 0;
  var completed = [];
  var videoUrls = [];
  for (var i = 0; i < taskKeys.length; i++) { completed.push(false); videoUrls.push(null); }
  t4PollTimer = setInterval(function(){
    attempts++;
    if (attempts > 180) { clearInterval(t4PollTimer); t4PollTimer=null; document.getElementById('gp-text').textContent='⏰ 超时'; t4ResetGenUI(); return; }
    var doneCount = completed.filter(Boolean).length;
    document.getElementById('gp-fill').style.width = Math.min(20+(doneCount/taskKeys.length)*75,95)+'%';
    document.getElementById('gp-text').textContent = '逐镜头生成中… '+doneCount+'/'+taskKeys.length+' 完成 ('+(attempts*5)+'s)';
    for (var i = 0; i < taskKeys.length; i++) {
      if (completed[i]) continue;
      (function(ii){
        fetch('/api/videogen/status/'+taskKeys[ii]).then(function(r){return r.json()}).then(function(d){
          if (d.status==='completed' && d.videoUrl) { completed[ii]=true; videoUrls[ii]=d.videoUrl; }
          else if (d.status==='failed') { completed[ii]=true; }
        }).catch(function(){});
      })(i);
    }
    if (completed.every(Boolean)) {
      clearInterval(t4PollTimer); t4PollTimer=null;
      var urls = videoUrls.filter(Boolean);
      document.getElementById('gp-fill').style.width='100%';
      if (urls.length===0) { document.getElementById('gp-text').textContent='❌ 所有镜头生成失败'; }
      else {
        document.getElementById('gp-text').textContent='✅ '+urls.length+'/'+taskKeys.length+' 个镜头完成！';
        document.getElementById('gen-video').src=urls[0];
        document.getElementById('gen-download').href=urls[0];
        document.getElementById('gen-result').classList.add('on');
      }
      t4ResetGenUI();
      setTimeout(function(){document.getElementById('gen-progress').classList.remove('on')},3000);
    }
  }, 5000);
}

// Hook into tab switching - render Tab 4 lazily but preserve edits
var _origSwitchTab = switchTab;
switchTab = function(id, el) {
  _origSwitchTab(id, el);
  if (id === 't4') renderTab4();
};
