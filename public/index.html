<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆款短视频拆解工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0c0c14;
    --bg-card: #16161f;
    --bg-card-hover: #1e1e2a;
    --bg-input: #1a1a26;
    --border: #2a2a3a;
    --border-dashed: #3a8a7c;
    --text: #e8e8f0;
    --text-secondary: #9999aa;
    --text-muted: #666680;
    --accent: #3ab09e;
    --accent-light: #5ec4b4;
    --accent-bg: rgba(58,176,158,0.1);
    --accent-border: rgba(58,176,158,0.3);
    --green: #10b981;
    --green-bg: rgba(16,185,129,0.08);
    --green-border: rgba(16,185,129,0.25);
    --orange: #f59e0b;
    --orange-bg: rgba(245,158,11,0.08);
    --orange-border: rgba(245,158,11,0.25);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.08);
    --red-border: rgba(239,68,68,0.25);
    --amber: #d97706;
    --amber-bg: rgba(217,119,6,0.08);
    --amber-border: rgba(217,119,6,0.25);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.08);
    --blue-border: rgba(59,130,246,0.25);
    --pink: #ec4899;
    --slate: #64748b;
    --slate-bg: rgba(100,116,139,0.08);
    --radius: 12px;
    --radius-lg: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    position: relative;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
  }
  .header-icon {
    width: 40px;
    height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header-icon svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: white;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .header-text h1 {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
  }
  .header-text p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ===== MAIN CONTAINER ===== */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 120px;
  }

  /* ===== UPLOAD ZONE ===== */
  .upload-zone {
    border: 2px dashed var(--border-dashed);
    border-radius: var(--radius-lg);
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    background: transparent;
    margin-bottom: 24px;
  }
  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(58,176,158,0.04);
  }
  .upload-zone .file-btn {
    display: inline-block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    position: absolute;
    top: 20px;
    left: 20px;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .upload-zone .file-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .upload-arrow {
    width: 48px;
    height: 48px;
    margin: 0 auto 18px;
    border: 2px solid var(--text-muted);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .upload-arrow svg {
    width: 24px;
    height: 24px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .upload-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .upload-hint {
    font-size: 13px;
    color: var(--text-muted);
  }
  .upload-selected {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-direction: column;
  }
  .upload-selected .filename {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent-light);
  }
  .upload-selected .filesize {
    font-size: 13px;
    color: var(--text-muted);
  }
  #file-input { display: none; }

  /* ===== FEATURE CARDS ===== */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .feature-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .feature-card:hover {
    border-color: var(--accent);
  }
  .feature-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    background: var(--accent-bg);
  }
  .feature-card h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .feature-card p {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ===== ANALYZE BUTTON ===== */
  .btn-analyze {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #2d9485);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 32px;
  }
  .btn-analyze:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(58,176,158,0.3);
  }
  .btn-analyze:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ===== PROGRESS ===== */
  .progress-wrap {
    display: none;
    margin-bottom: 32px;
  }
  .progress-wrap.active { display: block; }
  .progress-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .progress-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    height: 3px;
    width: 100%;
    background: linear-gradient(90deg, var(--accent), var(--pink), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .progress-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-steps { display: flex; flex-direction: column; gap: 10px; }
  .progress-step {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--text-muted);
    transition: color 0.3s;
  }
  .progress-step.done { color: var(--green); }
  .progress-step.active { color: var(--text); }
  .progress-step .step-icon { width: 20px; text-align: center; }

  /* ===== ERROR ===== */
  .error-card {
    display: none;
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    color: #fca5a5;
    gap: 10px;
    align-items: flex-start;
  }
  .error-card.active { display: flex; }

  /* ===== RESULT WRAP ===== */
  .result-wrap { display: none; }
  .result-wrap.active { display: block; }

  /* ===== META GRID ===== */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .meta-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .meta-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .meta-value {
    font-size: 20px;
    font-weight: 700;
  }
  .c-accent { color: var(--accent-light); }
  .c-green { color: var(--green); }
  .c-orange { color: var(--orange); }
  .c-pink { color: var(--pink); }

  /* ===== FORMULA BAR ===== */
  .formula-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 28px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .formula-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .formula-steps {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .f-step {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }
  .f-step.s-stop { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .f-step.s-pain { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .f-step.s-cure { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .f-step.s-trust { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .f-step.s-buy { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .f-step.s-other { background: var(--slate-bg); color: var(--slate); border: 1px solid rgba(100,116,139,0.25); }
  .f-arrow { color: var(--text-muted); font-size: 14px; }
  .f-name { font-size: 15px; font-weight: 700; color: var(--accent-light); margin-left: auto; }

  /* ===== SECTION HEADING ===== */
  .sec-heading {
    font-size: 18px;
    font-weight: 800;
    margin: 32px 0 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ===== SHOTS ===== */
  .shot-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
  .shot-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: flex;
    transition: border-color 0.2s;
  }
  .shot-card:hover { border-color: var(--accent); }
  .shot-thumb {
    width: 260px;
    min-height: 146px;
    flex-shrink: 0;
    background: var(--bg-input);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shot-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
  }
  .shot-thumb .placeholder {
    font-size: 40px;
    color: var(--text-muted);
    opacity: 0.3;
  }
  .shot-time {
    position: absolute;
    bottom: 8px; left: 8px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }
  .shot-body {
    padding: 18px 22px;
    flex: 1;
    min-width: 0;
  }
  .shot-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .shot-tag {
    padding: 3px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }
  .shot-tag.s-stop { background: var(--blue-bg); color: var(--blue); }
  .shot-tag.s-pain { background: var(--orange-bg); color: var(--orange); }
  .shot-tag.s-cure { background: var(--green-bg); color: var(--green); }
  .shot-tag.s-trust { background: var(--amber-bg); color: var(--amber); }
  .shot-tag.s-buy { background: var(--red-bg); color: var(--red); }
  .shot-tag.s-other { background: var(--slate-bg); color: var(--slate); }
  .shot-num {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .shot-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 8px;
  }
  .shot-extra {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .shot-extra strong { color: var(--text-secondary); }

  /* ===== ANALYSIS GRID ===== */
  .analysis-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .a-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
  }
  .a-card:hover { border-color: var(--accent); }
  .a-card h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .a-card ul { list-style: none; padding: 0; }
  .a-card ul li {
    font-size: 14px;
    color: var(--text-secondary);
    padding: 5px 0;
    line-height: 1.6;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .a-card ul li::before {
    content: '•';
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .a-card p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .a-full { grid-column: 1 / -1; }

  /* ===== ACTION BAR ===== */
  .action-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }
  .btn-sec {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .btn-sec:hover { border-color: var(--accent); background: var(--bg-card-hover); }
  .btn-sec:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== FLOATING TIP ===== */
  .float-tip {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: white;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(58,176,158,0.4);
    cursor: pointer;
    z-index: 100;
    transition: transform 0.2s;
  }
  .float-tip:hover { transform: translateY(-2px); }
  .float-tip .dot {
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
  }
  .float-tip .close-tip {
    margin-left: 8px;
    opacity: 0.7;
    cursor: pointer;
    font-size: 16px;
  }

  /* ===== LIGHTBOX ===== */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 8px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .meta-grid { grid-template-columns: 1fr 1fr; }
    .features { grid-template-columns: 1fr; }
    .analysis-grid { grid-template-columns: 1fr; }
    .a-full { grid-column: auto; }
    .shot-card { flex-direction: column; }
    .shot-thumb { width: 100%; min-height: 200px; }
    .formula-bar { flex-direction: column; align-items: flex-start; }
    .f-name { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  </div>
  <div class="header-text">
    <h1>爆款短视频拆解工具</h1>
    <p>AI驱动的视频结构分析</p>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Upload Zone -->
  <div class="upload-zone" id="upload-zone">
    <span class="file-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click();">未选择任何文件</span>
    <div class="upload-arrow">
      <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </div>
    <div class="upload-text">拖拽视频到这里，或点击上传</div>
    <div class="upload-hint">支持 MP4, MOV, AVI, WebM 格式，最大 100MB</div>
    <input type="file" id="file-input" accept="video/*">
  </div>

  <!-- Feature Cards -->
  <div class="features">
    <div class="feature-card">
      <div class="feature-icon">📷</div>
      <div><h3>智能镜头拆解</h3><p>自动识别场景切换，提取关键帧截图</p></div>
    </div>
    <div class="feature-card">
      <div class="feature-icon">📊</div>
      <div><h3>数据指标分析</h3><p>产品露出时长、首现时间等关键指标</p></div>
    </div>
    <div class="feature-card">
      <div class="feature-icon">📋</div>
      <div><h3>分镜脚本生成</h3><p>生成完整分镜表格，一键导出</p></div>
    </div>
    <div class="feature-card">
      <div class="feature-icon">🔄</div>
      <div><h3>跨品类改编</h3><p>智能改编脚本，适配不同产品</p></div>
    </div>
  </div>

  <!-- Analyze Button -->
  <button class="btn-analyze" id="btn-analyze" onclick="startAnalysis()">
    ⚡ 开始拆解分析
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-card">
      <div class="progress-title">
        <div class="spinner"></div>
        <span id="progress-msg">正在拆解视频…</span>
      </div>
      <div class="progress-steps" id="progress-steps"></div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-card" id="error-card">
    <span>⚠️</span>
    <span id="error-msg"></span>
  </div>

  <!-- Result -->
  <div class="result-wrap" id="result-wrap">
    <div class="meta-grid" id="meta-grid"></div>
    <div class="formula-bar" id="formula-bar"></div>

    <div class="sec-heading">🎬 镜头逐帧拆解</div>
    <div class="shot-list" id="shot-list"></div>

    <div class="sec-heading">📊 素材提取分析</div>
    <div class="analysis-grid" id="analysis-grid"></div>

    <div class="action-bar">
      <button class="btn-sec" onclick="resetAll()">🔄 拆解下一条</button>
      <button class="btn-sec" disabled>📝 写入飞书（Phase 2）</button>
    </div>
  </div>
</div>

<!-- Floating Tip -->
<div class="float-tip" id="float-tip">
  <span class="dot"></span>
  拉片具体怎么逐帧拆解？
  <span class="close-tip" onclick="event.stopPropagation(); document.getElementById('float-tip').style.display='none';">✕</span>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ===== STATE =====
let currentFile = null;

// ===== UPLOAD =====
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length && e.dataTransfer.files[0].type.startsWith('video/')) {
    currentFile = e.dataTransfer.files[0];
    showFileSelected();
  }
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) {
    currentFile = fileInput.files[0];
    showFileSelected();
  }
});

function showFileSelected() {
  uploadZone.innerHTML = `
    <div class="upload-selected">
      <div style="font-size:40px;">✅</div>
      <div class="filename">${esc(currentFile.name)}</div>
      <div class="filesize">${(currentFile.size/1024/1024).toFixed(1)} MB · 点击下方按钮开始拆解</div>
    </div>
    <input type="file" id="file-input" accept="video/*" style="display:none">
  `;
  // 重新绑定 file input
  document.getElementById('file-input').addEventListener('change', () => {
    if (document.getElementById('file-input').files.length) {
      currentFile = document.getElementById('file-input').files[0];
      showFileSelected();
    }
  });
}

// ===== ANALYSIS (SSE) =====
async function startAnalysis() {
  if (!currentFile) {
    showError('请先上传视频文件');
    return;
  }

  hideError();
  document.getElementById('result-wrap').classList.remove('active');
  document.getElementById('btn-analyze').disabled = true;
  showProgress();

  const formData = new FormData();
  formData.append('video', currentFile);

  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      body: formData
    });

    if (!response.ok && !response.headers.get('content-type')?.includes('event-stream')) {
      const err = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
      throw new Error(err.error || `HTTP ${response.status}`);
    }

    // 读取 SSE 流
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalData = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // 按 \n\n 切割 SSE 消息
      const parts = buffer.split('\n\n');
      buffer = parts.pop(); // 保留未完成的部分

      for (const part of parts) {
        const lines = part.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const msg = JSON.parse(line.substring(6));
              handleSSEMessage(msg);
              if (msg.data) finalData = msg.data;
            } catch (e) {
              console.warn('SSE parse skip:', line);
            }
          }
        }
      }
    }

    // 处理剩余 buffer
    if (buffer.trim()) {
      const lines = buffer.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const msg = JSON.parse(line.substring(6));
            handleSSEMessage(msg);
            if (msg.data) finalData = msg.data;
          } catch (e) {}
        }
      }
    }

    if (finalData && finalData.analysis) {
      renderResult(finalData);
    } else if (finalData) {
      renderResult(finalData);
    } else {
      throw new Error('未收到分析结果');
    }

  } catch (err) {
    showError('拆解失败: ' + err.message);
  } finally {
    document.getElementById('btn-analyze').disabled = false;
    setTimeout(() => hideProgress(), 400);
  }
}

function handleSSEMessage(msg) {
  const stepsEl = document.getElementById('progress-steps');
  const msgEl = document.getElementById('progress-msg');

  if (msg.step === -1) {
    showError(msg.message);
    return;
  }

  msgEl.textContent = msg.message || '处理中…';

  // 更新进度列表
  let stepEl = document.getElementById('pstep-' + msg.step);
  if (!stepEl) {
    stepEl = document.createElement('div');
    stepEl.id = 'pstep-' + msg.step;
    stepEl.className = 'progress-step active';
    stepEl.innerHTML = `<span class="step-icon">⏳</span> ${esc(msg.message)}`;
    stepsEl.appendChild(stepEl);
  }

  // 标记之前的步骤为完成
  stepsEl.querySelectorAll('.progress-step').forEach(el => {
    const id = parseInt(el.id.replace('pstep-', ''));
    if (id < msg.step) {
      el.className = 'progress-step done';
      el.querySelector('.step-icon').textContent = '✓';
    }
  });

  if (msg.data) {
    stepEl.className = 'progress-step done';
    stepEl.querySelector('.step-icon').textContent = '✓';
  }
}

// ===== RENDER RESULT =====
function renderResult(data) {
  const a = data.analysis || data;
  const ov = a.video_overview || {};
  const ss = a.script_structure || {};
  const em = a.extracted_materials || {};
  const shots = a.shots || [];

  // Meta
  document.getElementById('meta-grid').innerHTML = `
    <div class="meta-card">
      <div class="meta-label">视频时长</div>
      <div class="meta-value c-accent">${ov.total_duration_seconds ? ov.total_duration_seconds + 's' : '--'}</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">镜头数</div>
      <div class="meta-value c-green">${ov.total_shots || shots.length || '--'}</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">产品首现</div>
      <div class="meta-value c-orange">${ov.product_first_appear_seconds ? ov.product_first_appear_seconds + 's' : '--'}</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">产品露出</div>
      <div class="meta-value c-pink">${ov.product_exposure_ratio ? ov.product_exposure_ratio + '%' : '--'}</div>
    </div>
  `;

  // Formula bar
  const formula = ss.formula || '';
  const steps = formula.split('→').map(s => s.trim()).filter(Boolean);
  document.getElementById('formula-bar').innerHTML = `
    <span class="formula-label">底层公式</span>
    <div class="formula-steps">
      ${steps.map(s => `<span class="f-step ${stepClass(s)}">${esc(s)}</span>`).join('<span class="f-arrow">→</span>')}
    </div>
    <span class="f-name">${esc(ss.framework || '')}</span>
  `;

  // Shots
  document.getElementById('shot-list').innerHTML = shots.map((s, i) => {
    const frameUrl = s.frame_url || s.thumbnail || '';
    const thumbHtml = frameUrl
      ? `<img src="${esc(frameUrl)}" alt="镜头${i+1}" onclick="event.stopPropagation(); openLightbox('${esc(frameUrl)}')">`
      : `<div class="placeholder">🎬</div>`;
    const timeStr = s.time_start != null ? `${s.time_start}s - ${s.time_end}s` : '';

    return `
      <div class="shot-card">
        <div class="shot-thumb">
          ${thumbHtml}
          ${timeStr ? `<span class="shot-time">${esc(timeStr)}</span>` : ''}
        </div>
        <div class="shot-body">
          <div class="shot-top">
            <span class="shot-tag ${shotTypeClass(s.shot_type)}">${esc(s.shot_type || '镜头')}</span>
            <span class="shot-num">#${s.shot_number || i+1}</span>
          </div>
          <div class="shot-desc">${esc(s.scene_description || '')}</div>
          ${s.text_overlay ? `<div class="shot-extra"><strong>字幕：</strong>${esc(s.text_overlay)}</div>` : ''}
          ${s.voiceover ? `<div class="shot-extra"><strong>口播：</strong>${esc(s.voiceover)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // Analysis cards
  const cards = [];

  // 结构拆解
  if (ss.structure_breakdown && ss.structure_breakdown.length) {
    cards.push({
      icon: '📐', title: '脚本结构拆解', full: true,
      html: '<ul>' + ss.structure_breakdown.map(b =>
        `<li><strong>[${esc(b.element)}]</strong> ${esc(b.time_range || '')} — ${esc(b.description || '')}</li>`
      ).join('') + '</ul>'
    });
  }

  // 钩子话术
  if (em.hook_scripts && em.hook_scripts.length) {
    cards.push({
      icon: '🪝', title: '钩子话术（CTA库）',
      html: '<ul>' + em.hook_scripts.map(h =>
        `<li>${esc(h.text)} <span style="color:var(--text-muted);font-size:12px;">[${esc(h.action_type||'')}]</span></li>`
      ).join('') + '</ul>'
    });
  }

  // 痛点
  if (em.pain_points && em.pain_points.length) {
    cards.push({
      icon: '🔥', title: '痛点场景（痛点库）',
      html: '<ul>' + em.pain_points.map(p =>
        `<li><strong>${esc(p.scene||'')}</strong>：${esc(p.user_pain||'')} → ${esc(p.product_solution||'')}</li>`
      ).join('') + '</ul>'
    });
  }

  // 卖点
  if (em.selling_points && em.selling_points.length) {
    cards.push({
      icon: '💊', title: '卖点画面（卖点库）',
      html: '<ul>' + em.selling_points.map(s =>
        `<li><strong>[${esc(s.visual_type||'')}]</strong> ${esc(s.description||'')} <span style="color:var(--text-muted);font-size:12px;">${esc(s.shooting_notes||'')}</span></li>`
      ).join('') + '</ul>'
    });
  }

  // 社会证明
  if (em.social_proof && em.social_proof.length) {
    cards.push({
      icon: '🏅', title: '社会证明（信任库）',
      html: '<ul>' + em.social_proof.map(s =>
        `<li><strong>[${esc(s.type||'')}]</strong> ${esc(s.content||'')}</li>`
      ).join('') + '</ul>'
    });
  }

  // CTA
  if (em.cta_scripts && em.cta_scripts.length) {
    cards.push({
      icon: '🛒', title: '促单话术（权益库）',
      html: '<ul>' + em.cta_scripts.map(c =>
        `<li>${esc(c.text||'')} <span style="color:var(--text-muted);font-size:12px;">${esc(c.incentive||'')}</span></li>`
      ).join('') + '</ul>'
    });
  }

  // BGM
  if (em.bgm) {
    cards.push({
      icon: '🎵', title: 'BGM 分析',
      html: `<p><strong>情绪类型：</strong>${esc(em.bgm.mood||'')}<br><strong>风格：</strong>${esc(em.bgm.description||'')}</p>`
    });
  }

  // 可复用点
  if (a.reusable_points) {
    cards.push({
      icon: '✨', title: '可复用亮点', full: true,
      html: `<p>${esc(typeof a.reusable_points === 'string' ? a.reusable_points : JSON.stringify(a.reusable_points))}</p>`
    });
  }

  // 优化建议
  if (a.optimization_suggestions) {
    cards.push({
      icon: '💡', title: '优化建议', full: true,
      html: `<p>${esc(typeof a.optimization_suggestions === 'string' ? a.optimization_suggestions : JSON.stringify(a.optimization_suggestions))}</p>`
    });
  }

  document.getElementById('analysis-grid').innerHTML = cards.map(c =>
    `<div class="a-card ${c.full ? 'a-full' : ''}">
      <h3><span>${c.icon}</span> ${esc(c.title)}</h3>
      ${c.html}
    </div>`
  ).join('');

  document.getElementById('result-wrap').classList.add('active');
}

// ===== HELPERS =====
function esc(t) {
  const d = document.createElement('div');
  d.textContent = t || '';
  return d.innerHTML;
}

function stepClass(s) {
  const r = (s||'').toLowerCase();
  if (r.includes('停') || r.includes('hook') || r.includes('stop')) return 's-stop';
  if (r.includes('病') || r.includes('pain') || r.includes('痛')) return 's-pain';
  if (r.includes('药') || r.includes('cure') || r.includes('卖') || r.includes('product')) return 's-cure';
  if (r.includes('信') || r.includes('trust') || r.includes('proof')) return 's-trust';
  if (r.includes('买') || r.includes('buy') || r.includes('cta') || r.includes('促')) return 's-buy';
  return 's-other';
}

function shotTypeClass(type) {
  const r = (type||'').toLowerCase();
  if (r.includes('痛点') || r.includes('情绪')) return 's-pain';
  if (r.includes('产品') || r.includes('效果') || r.includes('卖点') || r.includes('展示') || r.includes('对比') || r.includes('特写') || r.includes('场景')) return 's-cure';
  if (r.includes('证明') || r.includes('认证') || r.includes('权威')) return 's-trust';
  if (r.includes('行动') || r.includes('引导') || r.includes('促') || r.includes('开箱')) return 's-buy';
  return 's-other';
}

function showProgress() {
  const w = document.getElementById('progress-wrap');
  document.getElementById('progress-steps').innerHTML = '';
  document.getElementById('progress-msg').textContent = '正在拆解视频…';
  w.classList.add('active');
}
function hideProgress() { document.getElementById('progress-wrap').classList.remove('active'); }
function showError(msg) { document.getElementById('error-msg').textContent = msg; document.getElementById('error-card').classList.add('active'); }
function hideError() { document.getElementById('error-card').classList.remove('active'); }

function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('active'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function resetAll() {
  currentFile = null;
  document.getElementById('result-wrap').classList.remove('active');
  hideError(); hideProgress();
  const uz = document.getElementById('upload-zone');
  uz.innerHTML = `
    <span class="file-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click();">未选择任何文件</span>
    <div class="upload-arrow"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7" stroke="var(--text-muted)" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="upload-text">拖拽视频到这里，或点击上传</div>
    <div class="upload-hint">支持 MP4, MOV, AVI, WebM 格式，最大 100MB</div>
    <input type="file" id="file-input" accept="video/*" style="display:none">
  `;
  document.getElementById('file-input').addEventListener('change', () => {
    if (document.getElementById('file-input').files.length) {
      currentFile = document.getElementById('file-input').files[0];
      showFileSelected();
    }
  });
}
