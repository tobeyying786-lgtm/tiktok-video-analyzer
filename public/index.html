<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆款短视频拆解工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0c14;--bg2:#13131c;--bg3:#1a1a26;--bg4:#22222e;--border:#2a2a3c;--text:#e8e8f0;--text2:#9999aa;--text3:#666680;--accent:#3ab09e;--accent2:#5ec4b4;--accentBg:rgba(58,176,158,.08);--blue:#3b82f6;--blueBg:rgba(59,130,246,.1);--blueBd:rgba(59,130,246,.3);--orange:#f59e0b;--orangeBg:rgba(245,158,11,.1);--orangeBd:rgba(245,158,11,.3);--green:#10b981;--greenBg:rgba(16,185,129,.1);--greenBd:rgba(16,185,129,.3);--red:#ef4444;--redBg:rgba(239,68,68,.1);--redBd:rgba(239,68,68,.3);--amber:#d97706;--amberBg:rgba(217,119,6,.1);--amberBd:rgba(217,119,6,.3);--pink:#ec4899;--pinkBg:rgba(236,72,153,.1);--purple:#8b5cf6;--purpleBg:rgba(139,92,246,.1);--slate:#64748b;--slateBg:rgba(100,116,139,.08);--r:12px;--r2:16px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.hdr{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}.hdr-icon{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}.hdr-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.hdr h1{font-size:17px;font-weight:700}.hdr p{font-size:12px;color:var(--text3)}.hdr-right{margin-left:auto;font-size:13px;color:var(--text2);cursor:pointer}.hdr-right:hover{color:var(--accent2)}
.main{max-width:1200px;margin:0 auto;padding:32px 24px 100px}
.upload-zone{border:2px dashed var(--accent);border-radius:var(--r2);padding:52px 32px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:20px;position:relative}.upload-zone:hover,.upload-zone.drag{border-color:var(--accent2);background:rgba(58,176,158,.03)}.upload-zone .fb{position:absolute;top:16px;left:16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer}.up-arrow{width:44px;height:44px;margin:0 auto 14px;border:2px solid var(--text3);border-radius:50%;display:flex;align-items:center;justify-content:center}.up-arrow svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.up-text{font-size:16px;color:var(--text2);margin-bottom:4px}.up-hint{font-size:13px;color:var(--text3)}#fileIn{display:none}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}.feat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;display:flex;gap:14px;align-items:flex-start}.feat:hover{border-color:var(--accent)}.feat .fi{font-size:22px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--accentBg);flex-shrink:0}.feat h3{font-size:14px;font-weight:600;margin-bottom:1px}.feat p{font-size:12px;color:var(--text3)}
.btn-go{width:100%;background:linear-gradient(135deg,var(--accent),#2d9485);color:#fff;border:none;border-radius:var(--r);padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}.btn-go:hover{box-shadow:0 6px 24px rgba(58,176,158,.3);transform:translateY(-1px)}.btn-go:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.prog{display:none;margin-bottom:28px}.prog.on{display:block}.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:24px;position:relative;overflow:hidden}.prog-card::before{content:'';position:absolute;top:0;left:0;height:3px;width:100%;background:linear-gradient(90deg,var(--accent),var(--pink),var(--accent));background-size:200% 100%;animation:shm 2s linear infinite}@keyframes shm{0%{background-position:200% 0}100%{background-position:-200% 0}}.prog-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}.spin{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;display:inline-block}@keyframes sp{to{transform:rotate(360deg)}}.prog-list{display:flex;flex-direction:column;gap:8px}.ps{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text3)}.ps.done{color:var(--green)}.ps.on{color:var(--text)}.ps .si{width:18px;text-align:center}
.err{display:none;background:var(--redBg);border:1px solid var(--redBd);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;font-size:14px;color:#fca5a5;gap:10px;align-items:center}.err.on{display:flex}
#page-result{display:none}
.tip-bar{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:var(--r);padding:12px 18px;margin-bottom:20px;font-size:14px;color:var(--orange);display:flex;align-items:center;gap:10px}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px}.mc .mv{font-size:26px;font-weight:900;margin-bottom:2px}.mc .ml{font-size:12px;color:var(--text3)}.mc .ms{font-size:11px;color:var(--text3);margin-top:2px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}.tab{padding:12px 20px;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;display:flex;align-items:center;gap:6px}.tab:hover{color:var(--text)}.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}.tab-panel{display:none}.tab-panel.active{display:block}
.shot-bar{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}.shot-bar::-webkit-scrollbar{height:4px}.shot-bar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}.sb-seg{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0}
.shot-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;margin-bottom:20px}.shot-scroll::-webkit-scrollbar{height:6px}.shot-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}.sc{flex-shrink:0;width:180px;cursor:pointer;transition:.2s}.sc:hover{transform:translateY(-2px)}.sc-img{width:180px;height:240px;border-radius:var(--r);overflow:hidden;position:relative;background:var(--bg3);border:2px solid transparent}.sc-img.fp-border{border-color:var(--orange)}.sc-img img{width:100%;height:100%;object-fit:cover}.sc-img .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--text3);opacity:.3}.sc-img .sn{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.75);color:#fff;padding:1px 8px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600}.sc-img .st{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.75);color:#fff;padding:1px 8px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace}.sc-img .fpb{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:var(--orange);color:#fff;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600}.sc-tag{margin-top:6px;text-align:center}.sc-tag span{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;display:inline-block}
.shot-stats{display:flex;gap:24px;justify-content:center;padding:20px 0;flex-wrap:wrap}.ss-item{text-align:center}.ss-item .ssn{font-size:28px;font-weight:900}.ss-item .ssl{margin-top:4px}.ss-item .ssl span{padding:3px 12px;border-radius:6px;font-size:12px;font-weight:600}
.sb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.sb-top h3{font-size:16px;font-weight:700}.btn-copy{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit}.btn-copy:hover{border-color:var(--accent);color:var(--text)}
.sb-table{width:100%;border-collapse:collapse;margin-bottom:20px}.sb-table th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}.sb-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:top}.sb-table tr:hover td{background:rgba(255,255,255,.02)}.sb-table .td-img{width:80px}.sb-table .td-img img{width:72px;height:96px;object-fit:cover;border-radius:6px;cursor:zoom-in}.sb-table .td-img .ph{width:72px;height:96px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text3)}.sb-table .type-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.str-layout{display:grid;grid-template-columns:1fr 420px;gap:24px}.str-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}.str-block .sb-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:700;margin-bottom:10px}.str-block .sb-time{float:right;font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}.str-block .sb-count{font-size:11px;color:var(--text3);margin-left:6px}.str-block .sb-desc{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:8px}.str-block .sb-note{font-size:13px;color:var(--text3);font-style:italic}
.rw-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:24px}.rw-panel h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}.rw-field{margin-bottom:14px}.rw-field label{display:block;font-size:13px;color:var(--text3);margin-bottom:4px}.rw-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit}.rw-field input:focus{border-color:var(--accent)}.rw-field input::placeholder{color:var(--text3)}.btn-rw{width:100%;background:var(--bg3);border:1px solid var(--accent);border-radius:var(--r);padding:12px;font-size:15px;font-weight:700;color:var(--accent2);cursor:pointer;font-family:inherit;transition:.2s}.btn-rw:hover{background:var(--accentBg)}.btn-rw:disabled{opacity:.5;cursor:not-allowed}
.rw-result{margin-top:20px}.rw-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;position:relative}.rw-item .rw-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-bottom:8px}.rw-item .rw-en{font-size:14px;color:var(--accent2);margin-bottom:4px;font-weight:600}.rw-item .rw-cn{font-size:13px;color:var(--text2)}.rw-item .rw-note{font-size:12px;color:var(--text3);margin-top:6px;font-style:italic}.rw-item .btn-cp{position:absolute;top:12px;right:12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text3);cursor:pointer;font-family:inherit}.rw-item .btn-cp:hover{border-color:var(--accent);color:var(--text)}
.action-bar{display:flex;gap:12px;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}.btn-sec{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s;font-family:inherit}.btn-sec:hover{border-color:var(--accent);background:var(--bg3)}.btn-sec:disabled{opacity:.4;cursor:not-allowed}
.c-blue{color:var(--blue)}.bg-blue{background:var(--blueBg);color:var(--blue)}.c-orange{color:var(--orange)}.bg-orange{background:var(--orangeBg);color:var(--orange)}.c-green{color:var(--green)}.bg-green{background:var(--greenBg);color:var(--green)}.c-amber{color:var(--amber)}.bg-amber{background:var(--amberBg);color:var(--amber)}.c-red{color:var(--red)}.bg-red{background:var(--redBg);color:var(--red)}.c-pink{color:var(--pink)}.bg-pink{background:var(--pinkBg);color:var(--pink)}.c-purple{color:var(--purple)}.bg-purple{background:var(--purpleBg);color:var(--purple)}.c-slate{color:var(--slate)}.bg-slate{background:var(--slateBg);color:var(--slate)}.c-accent{color:var(--accent2)}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out}.lb.on{display:flex}.lb img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px}
.ftip{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(58,176,158,.4);cursor:pointer;z-index:100}.ftip .dot{width:7px;height:7px;background:#fff;border-radius:50%;opacity:.8}.ftip .x{margin-left:6px;opacity:.7;font-size:14px}
@media(max-width:900px){.metrics{grid-template-columns:repeat(2,1fr)}.feat-grid{grid-template-columns:1fr}.str-layout{grid-template-columns:1fr}.shot-scroll .sc{width:150px}.sc-img{width:150px;height:200px}}
@media(max-width:600px){.metrics{grid-template-columns:1fr}.hdr{padding:14px 16px}.main{padding:20px 12px 80px}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div><h1>爆款短视频拆解工具</h1><p id="hdr-sub">AI驱动的视频结构分析</p></div><span class="hdr-right" id="btn-reset" style="display:none" onclick="resetAll()">← 重新分析</span></div>
<div class="main">
<div id="page-upload">
  <div class="upload-zone" id="upzone"><span class="fb" onclick="event.stopPropagation();document.getElementById('fileIn').click()">未选择任何文件</span><div class="up-arrow"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div><div class="up-text">拖拽视频到这里，或点击上传</div><div class="up-hint">支持 MP4, MOV, AVI, WebM 格式，最大 200MB</div><input type="file" id="fileIn" accept="video/*"></div>
  <div class="feat-grid"><div class="feat"><div class="fi">📷</div><div><h3>智能镜头拆解</h3><p>自动识别场景切换，提取关键帧截图</p></div></div><div class="feat"><div class="fi">📊</div><div><h3>数据指标分析</h3><p>产品露出时长、首现时间等关键指标</p></div></div><div class="feat"><div class="fi">📋</div><div><h3>分镜脚本生成</h3><p>生成完整分镜表格，一键导出</p></div></div><div class="feat"><div class="fi">🔄</div><div><h3>跨品类改编</h3><p>智能改编脚本，适配不同产品</p></div></div></div>
  <button class="btn-go" id="btn-go" onclick="startAnalysis()">⚡ 开始拆解分析</button>
  <div class="prog" id="prog"><div class="prog-card"><div class="prog-title"><div class="spin"></div><span id="prog-msg">分析中…</span></div><div class="prog-list" id="prog-list"></div></div></div>
  <div class="err" id="errBox"><span>⚠️</span><span id="errMsg"></span></div>
</div>
<div id="page-result">
  <div class="metrics" id="metrics"></div>
  <div class="tip-bar" id="tip-bar"></div>
  <div class="tabs"><div class="tab active" data-tab="t1" onclick="switchTab('t1',this)">📷 镜头截图</div><div class="tab" data-tab="t2" onclick="switchTab('t2',this)">📋 分镜脚本</div><div class="tab" data-tab="t3" onclick="switchTab('t3',this)">📊 脚本结构分析</div><div class="tab" style="color:var(--text3);cursor:default;opacity:.5">✨ AI 视频生成</div><div class="tab" style="color:var(--text3);cursor:default;opacity:.5">📥 导出报告</div></div>
  <div class="tab-panel active" id="t1"></div>
  <div class="tab-panel" id="t2"></div>
  <div class="tab-panel" id="t3"></div>
  <div class="action-bar">
    <button class="btn-sec" id="btn-feishu" onclick="saveToFeishu()">📝 写入飞书多维表格</button>
    <button class="btn-sec" onclick="resetAll()">🔄 拆解下一条</button>
  </div>
</div>
</div>
<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lb-img" src=""></div>
<div class="ftip" id="ftip"><span class="dot"></span>拉片具体怎么逐帧拆解？<span class="x" onclick="event.stopPropagation();document.getElementById('ftip').style.display='none'">✕</span></div>
<script>
let curFile=null,analysisData=null;
const upzone=document.getElementById('upzone'),fileIn=document.getElementById('fileIn');
upzone.addEventListener('click',()=>fileIn.click());
upzone.addEventListener('dragover',e=>{e.preventDefault();upzone.classList.add('drag')});
upzone.addEventListener('dragleave',()=>upzone.classList.remove('drag'));
upzone.addEventListener('drop',e=>{e.preventDefault();upzone.classList.remove('drag');if(e.dataTransfer.files.length&&e.dataTransfer.files[0].type.startsWith('video/')){curFile=e.dataTransfer.files[0];showSel()}});
fileIn.addEventListener('change',()=>{if(fileIn.files.length){curFile=fileIn.files[0];showSel()}});
function showSel(){upzone.innerHTML='<div style="text-align:center"><div style="font-size:40px;margin-bottom:10px">✅</div><div style="font-size:16px;font-weight:600;color:var(--accent2)">'+esc(curFile.name)+'</div><div style="font-size:13px;color:var(--text3)">'+(curFile.size/1048576).toFixed(1)+' MB</div></div><input type="file" id="fileIn" accept="video/*" style="display:none">';document.getElementById('fileIn').addEventListener('change',()=>{if(document.getElementById('fileIn').files.length){curFile=document.getElementById('fileIn').files[0];showSel()}})}
async function startAnalysis(){if(!curFile)return showErr('请先上传视频文件');hideErr();document.getElementById('btn-go').disabled=true;showProg();const fd=new FormData();fd.append('video',curFile);try{const resp=await fetch('/api/analyze',{method:'POST',body:fd});if(!resp.ok&&!resp.headers.get('content-type')?.includes('event-stream')){const e=await resp.json().catch(()=>({}));throw new Error(e.error||'HTTP '+resp.status)}const reader=resp.body.getReader(),dec=new TextDecoder();let buf='',final=null;while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const parts=buf.split('\n\n');buf=parts.pop();for(const p of parts)for(const l of p.split('\n'))if(l.startsWith('data: ')){try{const m=JSON.parse(l.slice(6));onSSE(m);if(m.data)final=m.data}catch(e){}}}if(buf.trim())for(const l of buf.split('\n'))if(l.startsWith('data: ')){try{const m=JSON.parse(l.slice(6));onSSE(m);if(m.data)final=m.data}catch(e){}}if(!final)throw new Error('未收到分析结果');analysisData=final;renderResult(final)}catch(e){showErr('拆解失败: '+e.message)}finally{document.getElementById('btn-go').disabled=false;setTimeout(hideProg,300)}}
function onSSE(m){const list=document.getElementById('prog-list'),msg=document.getElementById('prog-msg');if(m.step===-1){showErr(m.message);return}msg.textContent=m.message||'';let el=document.getElementById('ps-'+m.step);if(!el){el=document.createElement('div');el.id='ps-'+m.step;el.className='ps on';el.innerHTML='<span class="si">⏳</span>'+esc(m.message);list.appendChild(el)}list.querySelectorAll('.ps').forEach(p=>{const id=parseFloat(p.id.replace('ps-',''));if(id<m.step){p.className='ps done';p.querySelector('.si').textContent='✓'}});if(m.data){el.className='ps done';el.querySelector('.si').textContent='✓'}}
function renderResult(data){const a=data.analysis||data,ov=a.video_overview||{},ss=a.script_structure||{},em=a.extracted_materials||{},shots=a.shots||[];document.getElementById('page-upload').style.display='none';document.getElementById('page-result').style.display='block';document.getElementById('btn-reset').style.display='';document.getElementById('hdr-sub').textContent='分析报告 - '+(curFile?curFile.name:'');
document.getElementById('metrics').innerHTML='<div class="mc"><div class="mv c-orange">'+(ov.product_first_appear_seconds||'--')+'秒</div><div class="ml">产品首次出现</div><div class="ms">黄金3秒内出现最佳</div></div><div class="mc"><div class="mv c-green">'+(ov.product_exposure_seconds||'--')+'秒</div><div class="ml">产品露出时长</div><div class="ms">建议占比30%以上</div></div><div class="mc"><div class="mv c-accent">'+(ov.product_exposure_ratio||'--')+'%</div><div class="ml">产品露出占比</div><div class="ms">高转化视频40%+</div></div><div class="mc"><div class="mv c-blue">'+(ov.total_duration_seconds||'--')+'秒</div><div class="ml">视频总时长</div><div class="ms">短视频15-60秒最佳</div></div><div class="mc"><div class="mv c-pink">'+(ov.total_shots||shots.length)+'个</div><div class="ml">镜头数量</div><div class="ms">平均2-3秒/镜头</div></div>';
const fa=ov.product_first_appear_seconds;document.getElementById('tip-bar').innerHTML=fa?'💡 优化建议：产品首现时间为'+fa+'秒，'+(fa>5?'建议在5秒内展示产品':'表现良好！'):'';
renderTab1(shots);renderTab2(shots);renderTab3(a,ss,shots)}
function renderTab1(shots){const tc={};shots.forEach(s=>{const t=s.shot_type||'其他';tc[t]=(tc[t]||0)+1});let bar='',cards='';shots.forEach((s,i)=>{const cls=shotCls(s.shot_type);bar+='<div class="sb-seg bg-'+cls+'">'+esc(s.shot_type||'')+' '+s.time_start+'-'+s.time_end+'s</div>';const url=s.frame_url||'';const isFirst=s.product_visible&&!shots.slice(0,i).some(x=>x.product_visible);cards+='<div class="sc" onclick="'+(url?"openLB('"+esc(url)+"')":'')+'">'+'<div class="sc-img'+(isFirst?' fp-border':'')+'">'+(url?'<img src="'+esc(url)+'" alt="">':'<div class="ph">🎬</div>')+'<span class="sn">#'+(s.shot_number||i+1)+'</span><span class="st">'+(s.time_start??'')+'s</span>'+(isFirst?'<span class="fpb">⭐ 产品首现</span>':'')+'</div><div class="sc-tag"><span class="bg-'+cls+'">'+esc(s.shot_type||'镜头')+'</span></div></div>'});let stats='';Object.entries(tc).sort((a,b)=>b[1]-a[1]).forEach(([t,n])=>{stats+='<div class="ss-item"><div class="ssn">'+n+'</div><div class="ssl"><span class="bg-'+shotCls(t)+'">'+esc(t)+'</span></div></div>'});
document.getElementById('t1').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:15px;font-weight:700">🎬 全部镜头（'+shots.length+'个分镜）</div><div style="font-size:12px;color:var(--text3)">点击镜头可放大查看 ⭐ 产品首现</div></div><div class="shot-bar">'+bar+'</div><div class="shot-scroll">'+cards+'</div><div class="shot-stats">'+stats+'</div>'}
function renderTab2(shots){let rows='';shots.forEach((s,i)=>{const url=s.frame_url||'';const cls=shotCls(s.shot_type);rows+='<tr><td style="font-weight:600">#'+(s.shot_number||i+1)+'</td><td style="font-family:JetBrains Mono,monospace;font-size:12px;white-space:nowrap">'+s.time_start+'-'+s.time_end+'s</td><td><span class="type-tag bg-'+cls+'">'+esc(s.shot_type||'')+'</span></td><td style="max-width:300px;line-height:1.6">'+esc(s.scene_description||'')+'</td><td class="td-img">'+(url?'<img src="'+esc(url)+'" onclick="openLB(\''+esc(url)+'\')">':'<div class="ph">🎬</div>')+'</td><td style="max-width:260px;font-size:12px;line-height:1.6">'+(s.voiceover?'<strong>口播：</strong>'+esc(s.voiceover)+'<br>':'')+(s.text_overlay?'<strong>字幕：</strong>'+esc(s.text_overlay):'')+'</td><td style="text-align:center">'+(s.product_visible?'<span class="c-red" style="font-size:18px">✕</span>':'')+'</td></tr>'});
document.getElementById('t2').innerHTML='<div class="sb-top"><h3>分镜脚本表格</h3><button class="btn-copy" onclick="copyTable()">📋 复制表格</button></div><div style="overflow-x:auto"><table class="sb-table" id="sb-table"><thead><tr><th>镜头</th><th>时间</th><th>类型</th><th>画面描述</th><th>镜头截图</th><th>文案/口播</th><th>产品</th></tr></thead><tbody>'+rows+'</tbody></table></div>'}
function renderTab3(a,ss,shots){const bd=ss.structure_breakdown||[];let blocks='';bd.forEach(b=>{const cls=elemCls(b.element);const sn=b.shots_included||[];const sd=sn.map(n=>{const s=shots.find(x=>x.shot_number===n);return s?s.scene_description:''}).filter(Boolean);blocks+='<div class="str-block"><span class="sb-tag bg-'+cls+'">'+esc(b.element)+'</span><span class="sb-time">'+esc(b.time_range||'')+'</span><span class="sb-count">x'+sn.length+'</span><div class="sb-desc" style="margin-top:10px">'+sd.map(d=>esc(d)).join('；')+'</div><div class="sb-note">+'+esc(b.description||'')+'</div></div>'});
document.getElementById('t3').innerHTML='<div class="str-layout"><div class="str-left"><div style="font-size:16px;font-weight:700;margin-bottom:6px">📊 脚本结构分析</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:13px;color:var(--text3)">分析和拆解文案脚本结构</span><span style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 12px;font-size:12px;color:var(--text3);font-family:JetBrains Mono,monospace">'+(curFile?curFile.name.replace(/\.[^.]+$/,''):'')+'</span></div>'+blocks+'</div><div class="str-right" style="position:sticky;top:80px;align-self:start"><div class="rw-panel"><h3>✏️ 将文案脚本进行跨类目复刻</h3><div class="rw-field"><label>新品类</label><input id="rw-cat" placeholder="宠物用品"></div><div class="rw-field"><label>产品名称</label><input id="rw-name" placeholder="猫咪自动饮水机"></div><div class="rw-field"><label>核心卖点（可选）</label><input id="rw-sell" placeholder="静音水泵、四重过滤、2L大容量"></div><button class="btn-rw" id="btn-rw" onclick="doRewrite()">开始跨品类改编</button><div class="rw-result" id="rw-result"></div></div></div></div>'}
async function doRewrite(){const cat=document.getElementById('rw-cat').value.trim();const name=document.getElementById('rw-name').value.trim();const sell=document.getElementById('rw-sell').value.trim();if(!cat||!name)return showErr('请填写新品类和产品名称');hideErr();const btn=document.getElementById('btn-rw');btn.disabled=true;btn.textContent='改编中…';const re=document.getElementById('rw-result');re.innerHTML='<div style="color:var(--text3);padding:20px;text-align:center"><div class="spin" style="margin:0 auto 10px"></div>Claude 正在改编脚本…</div>';try{const resp=await fetch('/api/rewrite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analysis:analysisData?.analysis||analysisData,newCategory:cat,productName:name,coreSellingPoints:sell})});const data=await resp.json();if(!resp.ok)throw new Error(data.error||'改写失败');renderRewrite(data.rewrite)}catch(e){re.innerHTML='<div style="color:var(--red);padding:12px">❌ '+esc(e.message)+'</div>'}finally{btn.disabled=false;btn.textContent='开始跨品类改编'}}
function renderRewrite(rw){const items=rw.rewritten_structure||[];const re=document.getElementById('rw-result');if(rw.raw_response){re.innerHTML='<div style="background:var(--bg3);border-radius:var(--r);padding:16px;margin-top:16px;font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.8">'+esc(rw.raw_response)+'</div>';return}let h=items.map(it=>{const cls=elemCls(it.element);return'<div class="rw-item"><button class="btn-cp" onclick="navigator.clipboard.writeText(this.parentElement.innerText)">复制</button><span class="rw-tag bg-'+cls+'">'+esc(it.element)+'</span><div class="rw-en">'+esc(it.scene_description_en||it.voiceover_en||'')+'</div><div class="rw-cn">'+esc(it.scene_description_cn||it.voiceover_cn||'')+'</div>'+(it.shooting_notes?'<div class="rw-note">推荐镜头：'+esc(it.shooting_notes)+'</div>':'')+'</div>'}).join('');if(rw.hook_suggestion)h+='<div class="rw-item"><span class="rw-tag bg-blue">Hook</span><div class="rw-en">'+esc(rw.hook_suggestion)+'</div></div>';if(rw.cta_suggestion)h+='<div class="rw-item"><span class="rw-tag bg-red">CTA</span><div class="rw-en">'+esc(rw.cta_suggestion)+'</div></div>';re.innerHTML=h}
async function saveToFeishu(){if(!analysisData)return showErr('请先完成视频拆解');const btn=document.getElementById('btn-feishu');btn.disabled=true;btn.textContent='📝 写入中…';hideErr();const videoCode=prompt('请输入视频编码（可留空）：','')||'';try{const resp=await fetch('/api/save-to-feishu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analysis:analysisData?.analysis||analysisData,videoCode:videoCode,videoUrl:analysisData?.videoUrl||'',filename:curFile?curFile.name:''})});const data=await resp.json();if(!resp.ok)throw new Error(data.error||'写入失败');const saved=data.results?.saved?.length||0;const errors=data.results?.errors?.length||0;btn.textContent='✅ 已写入 '+saved+' 条';if(errors>0)showErr('部分写入失败：'+data.results.errors.map(e=>e.table+': '+e.error).join('; '));setTimeout(()=>{btn.textContent='📝 写入飞书多维表格';btn.disabled=false},3000)}catch(e){showErr('飞书写入失败: '+e.message);btn.textContent='📝 写入飞书多维表格';btn.disabled=false}}
function switchTab(id,el){if(el.style.opacity==='0.5')return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById(id).classList.add('active')}
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML}
function shotCls(t){const r=(t||'').toLowerCase();if(r.includes('痛点')||r.includes('情绪'))return'orange';if(r.includes('产品')||r.includes('展示'))return'green';if(r.includes('场景')||r.includes('使用'))return'blue';if(r.includes('特写')||r.includes('细节'))return'purple';if(r.includes('对比')||r.includes('效果'))return'amber';if(r.includes('行动')||r.includes('引导'))return'red';if(r.includes('开箱'))return'pink';if(r.includes('证明'))return'amber';return'slate'}
function elemCls(e){const r=(e||'').toLowerCase();if(r.includes('停'))return'blue';if(r.includes('病'))return'orange';if(r.includes('药'))return'green';if(r.includes('信'))return'amber';if(r.includes('买'))return'red';return'slate'}
function showProg(){document.getElementById('prog').classList.add('on');document.getElementById('prog-list').innerHTML='';document.getElementById('prog-msg').textContent='分析中…'}
function hideProg(){document.getElementById('prog').classList.remove('on')}
function showErr(m){document.getElementById('errMsg').textContent=m;document.getElementById('errBox').classList.add('on')}
function hideErr(){document.getElementById('errBox').classList.remove('on')}
function openLB(src){document.getElementById('lb-img').src=src;document.getElementById('lb').classList.add('on')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lb').classList.remove('on')});
function copyTable(){const t=document.getElementById('sb-table');if(!t)return;const r=document.createRange();r.selectNode(t);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');window.getSelection().removeAllRanges();const b=document.querySelector('.btn-copy');b.textContent='✓ 已复制';setTimeout(()=>b.textContent='📋 复制表格',2000)}
function resetAll(){curFile=null;analysisData=null;document.getElementById('page-upload').style.display='';document.getElementById('page-result').style.display='none';document.getElementById('btn-reset').style.display='none';document.getElementById('hdr-sub').textContent='AI驱动的视频结构分析';hideErr();hideProg();const uz=document.getElementById('upzone');uz.innerHTML='<span class="fb" onclick="event.stopPropagation();document.getElementById(\'fileIn\').click()">未选择任何文件</span><div class="up-arrow"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7" stroke="var(--text3)" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="up-text">拖拽视频到这里，或点击上传</div><div class="up-hint">支持 MP4, MOV, AVI, WebM 格式，最大 200MB</div><input type="file" id="fileIn" accept="video/*" style="display:none">';document.getElementById('fileIn').addEventListener('change',()=>{if(document.getElementById('fileIn').files.length){curFile=document.getElementById('fileIn').files[0];showSel()}})}
</script>
</body>
