<body>
<div class="hdr"><div class="hdr-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div><h1>爆款短视频拆解工具</h1><p id="hdr-sub">AI驱动的视频结构分析</p></div><span class="hdr-right" id="btn-reset" style="display:none" onclick="resetAll()">← 重新分析</span></div>
<div class="main">
<div id="page-upload">

  <div class="feat-grid"><div class="feat"><div class="fi">📷</div><div><h3>智能镜头拆解</h3><p>自动识别场景切换，提取关键帧截图</p></div></div><div class="feat"><div class="fi">📊</div><div><h3>数据指标分析</h3><p>产品露出时长、首现时间等关键指标</p></div></div><div class="feat"><div class="fi">📋</div><div><h3>分镜脚本生成</h3><p>生成完整分镜表格，一键导出</p></div></div><div class="feat"><div class="fi">🔄</div><div><h3>跨品类改编</h3><p>智能改编脚本，适配不同产品</p></div></div></div>
  <button class="btn-go" id="btn-go" onclick="startAnalysis()">⚡ 开始拆解分析</button>
  <div class="prog" id="prog"><div class="prog-card"><div class="prog-title"><div class="spin"></div><span id="prog-msg">分析中…</span></div><div class="prog-list" id="prog-list"></div></div></div>
  <div class="err" id="errBox"><span>⚠️</span><span id="errMsg"></span></div>
</div>
<div id="page-result">

  <div class="tabs"><div class="tab active" data-tab="t1" onclick="switchTab('t1',this)">📷 镜头截图</div><div class="tab" data-tab="t2" onclick="switchTab('t2',this)">📋 分镜脚本</div><div class="tab" data-tab="t3" onclick="switchTab('t3',this)">📊 脚本结构分析</div><div class="tab" data-tab="t4" onclick="switchTab('t4',this)">✨ AI 视频生成</div><div class="tab" style="color:var(--text3);cursor:default;opacity:.5">📥 导出报告</div></div>
  <div class="tab-panel active" id="t1"></div>
  <div class="tab-panel" id="t2"></div>
  <div class="tab-panel" id="t3"></div>
  <div class="tab-panel" id="t4"></div>
  <div class="action-bar">
    <button class="btn-sec" id="btn-feishu" onclick="saveToFeishu()">📝 写入飞书多维表格</button>

</div>
</div>
